<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telugu Live Subtitles</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #161a23; --border: #252b38;
    --accent: #4f8ef7; --green: #1ecc96; --danger: #e05c5c;
    --text: #e8ecf5; --muted: #6b7896; --interim: #8fa3d0;
  }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 1.5rem 1rem; }
  header { text-align: center; margin-bottom: 1.5rem; }
  header h1 { font-family: 'Noto Sans Telugu', sans-serif; font-size: clamp(1.2rem, 4vw, 1.8rem); font-weight: 600; }
  header p { font-size: 0.68rem; color: var(--muted); margin-top: .3rem; letter-spacing: .08em; text-transform: uppercase; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 800px; padding: 1.2rem; margin-bottom: 1rem; }

  #sub-box {
    min-height: 100px;
    font-family: 'Noto Sans Telugu', sans-serif;
    font-size: clamp(1.4rem, 3.5vw, 2.2rem);
    line-height: 1.8;
    word-break: break-word;
  }
  #confirmed    { color: var(--text); }
  #live-word    { color: var(--interim); font-style: italic; }
  .cursor { display: inline-block; width: 2px; height: 1.1em; background: var(--accent); margin-left: 3px; vertical-align: text-bottom; animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .placeholder { color: var(--muted); font-size: 0.9rem; font-family: 'JetBrains Mono', monospace; }

  .status-row { display: flex; align-items: center; gap: .6rem; margin-top: .8rem; font-size: .7rem; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .dot.live  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse .9s ease-in-out infinite; }
  .dot.error { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  .controls { display: flex; gap: .7rem; flex-wrap: wrap; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: .5rem 1.2rem; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: .76rem; font-weight: 500; cursor: pointer; transition: all .15s; }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn.go  { border-color: var(--green); color: var(--green); }
  .btn.go:not(:disabled):hover { background: rgba(30,204,150,.08); }
  .btn.end { border-color: var(--danger); color: var(--danger); }
  .btn.end:not(:disabled):hover { background: rgba(224,92,92,.08); }
  .btn.clr { border-color: var(--border); color: var(--muted); font-size: .7rem; }
  .warn-box { font-size: .7rem; color: #EF9F27; background: rgba(239,159,39,.08); border: 1px solid rgba(239,159,39,.25); border-radius: 8px; padding: .6rem .9rem; margin-top: .8rem; line-height: 1.7; display: none; }
</style>
</head>
<body>

<header>
  <h1>తెలుగు లైవ్ సబ్‌టైటిల్స్</h1>
  <p>Append-only · Zero duplicates · Mobile ready</p>
</header>

<div class="card">
  <div id="sub-box">
    <span class="placeholder">Click Start and speak in Telugu...</span>
  </div>
  <div class="status-row">
    <div class="dot" id="sdot"></div>
    <span id="stext">Ready</span>
  </div>
</div>

<div class="card">
  <div class="controls">
    <button class="btn go"  id="btnStart" onclick="startRec()">▶ Start</button>
    <button class="btn end" id="btnStop"  onclick="stopRec()" disabled>■ Stop</button>
    <button class="btn clr"               onclick="clearAll()">Clear</button>
  </div>
  <div class="warn-box" id="warnBox"></div>
</div>

<script>
let recog   = null;
let running = false;

// ── The single source of truth ────────────────────────────────────────────────
// confirmedText  = everything locked in (never changes, only grows)
// prevRaw        = the full raw transcript from last event (to diff against)
let confirmedText = '';
let prevRaw       = '';

function setStatus(msg, cls) {
  document.getElementById('stext').textContent = msg;
  document.getElementById('sdot').className = 'dot' + (cls ? ' ' + cls : '');
}

// ── Core rendering ────────────────────────────────────────────────────────────
// confirmed = solid white text (locked in)
// interim   = grey italic (what's being spoken right now)
function render(interimText) {
  const box = document.getElementById('sub-box');

  if (!confirmedText && !interimText) {
    box.innerHTML = '<span class="placeholder">Speak in Telugu...</span>';
    return;
  }

  const sep = confirmedText && interimText ? ' ' : '';
  box.innerHTML =
    (confirmedText ? `<span id="confirmed">${confirmedText}</span>` : '') +
    (interimText   ? `${sep}<span id="live-word">${interimText}</span>` : '') +
    (running       ? '<span class="cursor"></span>' : '');
}

// ── Diff helper ───────────────────────────────────────────────────────────────
// Given the old full string and the new full string,
// return only the NEW suffix that was added.
// e.g. old="రేపు నేను"  new="రేపు నేను విజయవాడ"  → "విజయవాడ"
function getNewSuffix(oldText, newText) {
  oldText = oldText.trim();
  newText = newText.trim();
  if (!oldText) return newText;
  if (newText.startsWith(oldText)) {
    return newText.slice(oldText.length).trim();
  }
  // Fallback: find longest common prefix word by word
  const oldW = oldText.split(/\s+/);
  const newW = newText.split(/\s+/);
  let i = 0;
  while (i < oldW.length && i < newW.length && oldW[i] === newW[i]) i++;
  return newW.slice(i).join(' ').trim();
}

// ── Recognition logic ─────────────────────────────────────────────────────────
function startRec() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    const w = document.getElementById('warnBox');
    w.style.display = 'block';
    w.textContent = 'Web Speech API not supported. Use Chrome or Edge.';
    return;
  }

  recog = new SR();
  recog.lang            = 'te-IN';
  recog.continuous      = true;
  recog.interimResults  = true;
  recog.maxAlternatives = 1;

  recog.onstart = () => {
    running = true;
    prevRaw = '';
    setStatus('Listening — speak in Telugu', 'live');
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled  = false;
    render('');
  };

  recog.onresult = (e) => {
    // Build the complete raw transcript from ALL results so far
    let rawFull = '';
    let interimPart = '';

    for (let i = 0; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        rawFull += (rawFull ? ' ' : '') + t.trim();
      } else {
        interimPart += t; // currently being spoken
      }
    }
    rawFull = rawFull.trim();
    interimPart = interimPart.trim();

    // ── KEY LOGIC ─────────────────────────────────────────────────────────
    // rawFull grows like:
    //   "రేపు" → "రేపు నేను" → "రేపు నేను విజయవాడ వెళుతున్నాను"
    //
    // Instead of replacing confirmedText with rawFull (causes repeats),
    // we find ONLY the new words added since last event and APPEND them.

    if (rawFull.length > prevRaw.length) {
      const newWords = getNewSuffix(prevRaw, rawFull);
      if (newWords) {
        confirmedText += (confirmedText ? ' ' : '') + newWords;
      }
      prevRaw = rawFull;
    }

    // Show interim (currently being spoken) as grey text after confirmed
    render(interimPart);
  };

  recog.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    setStatus('Error: ' + e.error, 'error');
    const w = document.getElementById('warnBox');
    w.style.display = 'block';
    w.textContent = e.error === 'not-allowed'
      ? 'Microphone access denied. Allow mic in browser settings.'
      : 'Error: ' + e.error;
  };

  recog.onend = () => {
    if (running) {
      // On restart, reset prevRaw so we don't re-diff against stale state
      prevRaw = '';
      setTimeout(() => { if (running) { try { recog.start(); } catch(_){} } }, 200);
    } else {
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled  = true;
      setStatus('Stopped', '');
      render('');
    }
  };

  recog.start();
}

function stopRec() {
  running = false;
  if (recog) { recog.onend = null; recog.stop(); recog = null; }
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled  = true;
  setStatus('Stopped', '');
  render('');
}

function clearAll() {
  confirmedText = '';
  prevRaw       = '';
  document.getElementById('warnBox').style.display = 'none';
  render('');
}
</script>
</body>
</html>
